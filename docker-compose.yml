version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/lazyseeker.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY:-}
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
